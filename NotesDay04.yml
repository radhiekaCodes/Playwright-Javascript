Attribute priority :
-----------------------
1️⃣ aria-label – Accessibility-based, stable, Playwright’s top choice
2️⃣ id – Unique, fast
3️⃣ name – Usually stable, not always unique
4️⃣ class – For styling, changes often → least reliable


