Difference between "await" and "Auto wait" in Playwright


1️⃣ What await really does

await only waits for a Promise to resolve.

await page.click("#login");


This only means:

“Wait until the click command is sent to the browser”

It does NOT mean:

Button is visible

Button is enabled

Page finished loading

Element exists

It only waits for Playwright to issue the command.

2️⃣ What Playwright Auto-Wait does

Before Playwright performs any action like:

await page.click("#login")


Playwright internally waits until:

✔ element exists
✔ element is visible
✔ element is enabled
✔ element is not covered
✔ page is stable

Only then it clicks.

This is Auto-Wait.