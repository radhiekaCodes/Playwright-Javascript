📋 JavaScript Primitive Types

=================================================================================
Primitive	||	Example		  ||	       Can use methods?	        ||
=================================================================================
string			"hello"				✅ "hello".toUpperCase()
number			42				✅ 42..toFixed(2)
boolean			true				✅ true.toString()
undefined		undefined			⚠️ No methods
null			null				⚠️ No methods
💡 rarely used
symbol			Symbol()			✅ Limited methods
bigint			123n				✅ 123n.toString()
=================================================================================
❌ Don't Use BigInt When:
// 1. Need decimals
const price = 10.99;  // Use Number, not BigInt

// 2. Performance-critical code (BigInt is slower)

// 3. Interacting with APIs expecting Numbers

🎯 Memory Trick
"BigInt is your friend when numbers go beyond 16 digits, keeping precision intact when Number fails and fidgets!"
Safe range: Up to 16 digits (9007 trillion) → Use Number
Beyond that: Use BigInt with 'n' suffix

📋 Quick Reference Card
		
=================================================================================
Operation	   ||	   Syntax   		 ||	      Example	        ||
=================================================================================
Create			n suffix			var x = 123n;
Create from string	BigInt()			BigInt("999")
Convert to Number	Number()			Number(123n)
Convert to BigInt	BigInt()			BigInt(123)
Compare with Number	Compare after conversion	123n === BigInt(123)
=================================================================================

