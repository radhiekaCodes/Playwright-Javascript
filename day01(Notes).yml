📝 What is console.log()?

🎯 Quick Answer
console.log() is JavaScript's built-in printing/debugging tool that displays output in the browser's Console or terminal.
console   → is a built-in object in JavaScript.
.         → Dot operator (access property/method)
log()     → Method that prints messages

📝 Printing Multiple Items in One Line with console.log()

🔍 Comparison Table
		
=================================================================================
Method	      ||		Syntax	  	  ||		Best For	||
=================================================================================
,Comma			console.log(a, b, c)		    Quick debugging
+ Operator		"a: " + a + " b: " + b		    Simple strings
Template Literals	`${a} ${b}`			    Variables + text
=================================================================================

