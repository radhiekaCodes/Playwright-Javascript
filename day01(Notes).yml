#####
---------------------------------------------------
// ===== script.js =====
// No packages/classes needed!

// Global code (runs directly)
console.log("Program starts here");

// Functions (like Java methods)
function greetUser(name) {
    return `Hello, ${name}!`;
}

// Variables
let userName = "Bhuvanesh";
const pi = 3.14;

// Calling functions
greetUser(userName);
---------------------------------------------------
📌 Remember: JavaScript programs are just files containing code that runs from top to bottom. 
		No packages, no classes required (unless you want them)!
----------------------------------------------------

💡 Separators = Punctuation marks of JavaScript
;  → End statement
,  → Separate items
.  → Access properties
() → Call functions
{} → Code blocks/objects
=> → Arrow functions

💡 Keywords = Reserved words with special meaning

let, const, if, else, for, while, 
function, return, class, try, catch


⚡ Memory Tips --> Think of JavaScript as: "Files full of functions that run directly!"
		💡 JavaScript = More flexible than Java (no forced structure)

📊 Quick Comparison: Java vs JavaScript
=================================================================================
Aspect	      ||		Java	  	  ||		JavaScript	||
=================================================================================
Structure	Project → Package → Class → Method	Project → File → Function
Entry Point	public static void main()		Top-level code runs directly
Class Required?		Yes				No (optional in ES6)
Separators	; . , () {} []				Same + => ... :
Keywords	50+ reserved words			40+ reserved words
=================================================================================
